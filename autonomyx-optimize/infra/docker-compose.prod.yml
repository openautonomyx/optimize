services:
  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    image: autonomyx-optimize-api:local
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/autonomyx
      REDIS_URL: redis://redis:6379
      API_PORT: 4000
      WEB_PORT: 3000
      JWT_SECRET: change-this-before-production
      DEFAULT_TENANT_SLUG: demo
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  web:
    build:
      context: ..
      dockerfile: infra/Dockerfile.web
    image: autonomyx-optimize-web:local
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:4000
      WEB_PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

  worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.worker
    image: autonomyx-optimize-worker:local
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/autonomyx
      REDIS_URL: redis://redis:6379
      API_PORT: 4000
      WEB_PORT: 3000
      JWT_SECRET: change-this-before-production
      DEFAULT_TENANT_SLUG: demo
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: autonomyx
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d autonomyx"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
