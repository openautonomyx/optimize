version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: autonomyx
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "13000:3000"
    environment:
      NODE_ENV: production
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
